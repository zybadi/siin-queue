<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zybadi's Queue</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── DARK THEME (default) ── */
  :root {
    --bg: #0d0f0e;
    --surface: #141716;
    --surface2: #1c201e;
    --border: #252a27;
    --green: #3effa0;
    --green-dim: #1a7a4a;
    --green-bg: rgba(62,255,160,0.08);
    --red: #ff4f4f;
    --amber: #ffb020;
    --blue: #60b8ff;
    --blue-bg: rgba(96,184,255,0.12);
    --blue-border: rgba(96,184,255,0.25);
    --text: #e8ede9;
    --text2: #b0bcb2;
    --muted: #6b7a6e;
    --done-bg: #0f1a14;
    --done-text: #3a4a3d;
    --shadow: 0 0 0 1px var(--green), 0 0 24px rgba(62,255,160,0.12);
  }

  /* ── LIGHT THEME ── */
  [data-theme="light"] {
    --bg: #f4f6f4;
    --surface: #ffffff;
    --surface2: #f0f2f0;
    --border: #d8ddd9;
    --green: #1a8a52;
    --green-dim: #1a8a52;
    --green-bg: rgba(26,138,82,0.08);
    --red: #d93030;
    --amber: #c07800;
    --blue: #2271b8;
    --blue-bg: rgba(34,113,184,0.08);
    --blue-border: rgba(34,113,184,0.2);
    --text: #111a13;
    --text2: #3a4a3d;
    --muted: #7a8c7d;
    --done-bg: #f0f4f0;
    --done-text: #aab8ac;
    --shadow: 0 0 0 1px var(--green), 0 0 16px rgba(26,138,82,0.1);
  }

  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; transition: background 0.25s, color 0.25s; }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-wrap: wrap; gap: 12px;
  }

  .header-left { display: flex; flex-direction: column; gap: 1px; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; color: var(--green); line-height: 1; }
  .logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 2px; font-family: 'DM Mono', monospace; }

  .header-right { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }

  .stats { display: flex; gap: 16px; align-items: center; }
  .stat { text-align: center; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 26px; line-height: 1; color: var(--green); }
  .stat-num.amber { color: var(--amber); }
  .stat-num.muted { color: var(--muted); }
  .stat-label { font-size: 9px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 1px; font-family: 'DM Mono', monospace; }
  .stat-divider { width: 1px; height: 30px; background: var(--border); }

  .btn-theme {
    width: 36px; height: 36px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: color 0.2s, border-color 0.2s, background 0.2s;
    flex-shrink: 0;
  }
  .btn-theme:hover { color: var(--text); border-color: var(--muted); }

  /* ── PROGRESS ── */
  .progress-wrap { height: 3px; background: var(--border); flex-shrink: 0; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--green), #00c97a); transition: width 0.5s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 0 10px rgba(62,255,160,0.35); }
  [data-theme="light"] .progress-bar { box-shadow: 0 0 6px rgba(26,138,82,0.3); }

  /* ── IMPORT ── */
  .import-section {
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .btn-import {
    background: var(--green); color: #fff;
    border: none; font-family: 'Bebas Neue', sans-serif;
    font-size: 17px; letter-spacing: 2px;
    padding: 0 22px; border-radius: 8px; height: 40px;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap; flex-shrink: 0;
  }
  [data-theme="dark"] .btn-import { color: #061009; }
  .btn-import:hover { opacity: 0.88; }
  .btn-import:active { transform: scale(0.97); }
  .import-hint { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .import-hint kbd {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 5px; font-size: 11px;
    color: var(--text2); font-family: 'DM Mono', monospace;
  }

  /* ── MANUAL ADD ── */
  .add-section {
    padding: 12px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .add-section h2 { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 8px; }
  .add-form { display: flex; gap: 8px; flex-wrap: wrap; }
  .add-form input {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; padding: 8px 13px; border-radius: 8px;
    outline: none; transition: border-color 0.2s; height: 38px;
  }
  .add-form input:focus { border-color: var(--green-dim); }
  .add-form input::placeholder { color: var(--muted); }
  .input-customer { flex: 1; min-width: 110px; }
  .input-item { flex: 2; min-width: 150px; }
  .input-notes { flex: 2; min-width: 150px; }
  .btn-add {
    background: var(--surface2); color: var(--green);
    border: 1px solid var(--green-dim); font-family: 'Bebas Neue', sans-serif;
    font-size: 15px; letter-spacing: 2px; padding: 0 16px;
    border-radius: 8px; cursor: pointer; transition: background 0.2s; height: 38px;
  }
  .btn-add:hover { background: var(--green-bg); }

  /* ── QUEUE SECTION ── */
  .queue-section { flex: 1; padding: 18px 28px 12px; }
  .queue-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .queue-title { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 3px; color: var(--muted); }
  .btn-clear-done {
    font-size: 11px; color: var(--muted); background: none;
    border: 1px solid var(--border); padding: 5px 11px;
    border-radius: 6px; cursor: pointer; font-family: 'DM Mono', monospace;
    transition: color 0.2s, border-color 0.2s;
  }
  .btn-clear-done:hover { color: var(--amber); border-color: var(--amber); }
  .btn-sort {
    font-size: 11px; color: var(--green); background: var(--green-bg);
    border: 1px solid var(--green-dim); padding: 5px 11px;
    border-radius: 6px; cursor: pointer; font-family: 'DM Mono', monospace;
    transition: color 0.2s, border-color 0.2s, background 0.2s; white-space: nowrap;
  }
  .btn-sort:hover { background: rgba(62,255,160,0.16); }
  .queue-list { display: flex; flex-direction: column; gap: 8px; }

  /* ── ORDER CARD ── */
  .order-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
    animation: slideIn 0.3s cubic-bezier(0.4,0,0.2,1);
    transition: background 0.2s, border-color 0.2s, opacity 0.2s;
  }
  @keyframes slideIn { from{transform:translateY(-8px);opacity:0} to{transform:translateY(0);opacity:1} }
  .order-card.current { border-color: var(--green); box-shadow: var(--shadow); }
  .order-card.done { background: var(--done-bg); border-color: var(--border); opacity: 0.45; }

  .current-tag {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--green); color: #061009;
    font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    padding: 3px 10px 3px 7px; border-radius: 0 0 8px 0; width: fit-content;
  }
  [data-theme="light"] .current-tag { color: #fff; }
  .current-tag::before { content:''; width:6px; height:6px; border-radius:50%; background:currentColor; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .card-body { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; }
  .card-position { font-family: 'Bebas Neue', sans-serif; font-size: 30px; color: var(--border); line-height: 1; min-width: 26px; text-align: center; flex-shrink: 0; padding-top: 3px; }
  .order-card.current .card-position { color: var(--green); }
  .order-card.done .card-position { color: var(--done-text); }

  .card-info { flex: 1; min-width: 0; }
  .card-customer { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .order-card.current .card-customer { color: var(--green); }
  .order-card.done .card-customer { color: var(--done-text); }

  .card-item { font-size: 13px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .order-card.current .card-item { color: var(--text2); }
  .order-card.done .card-item { color: var(--done-text); text-decoration: line-through; }

  .card-qty {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--blue-bg); border: 1px solid var(--blue-border);
    color: var(--blue); font-family: 'Bebas Neue', sans-serif;
    font-size: 14px; letter-spacing: 1px; padding: 1px 9px;
    border-radius: 5px; margin-top: 5px;
  }
  .order-card.done .card-qty { background: transparent; border-color: var(--border); color: var(--done-text); }

  .card-meta { display: flex; align-items: center; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .card-order-id {
    font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace;
    background: var(--surface2); border: 1px solid var(--border);
    padding: 1px 6px; border-radius: 4px;
  }
  .order-card.current .card-order-id { border-color: var(--green-dim); color: var(--green); }
  .order-card.done .card-order-id { color: var(--done-text); }

  .card-datetime {
    font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace;
    background: var(--surface2); border: 1px solid var(--border);
    padding: 1px 7px; border-radius: 4px; white-space: nowrap;
  }
  .order-card.done .card-datetime { color: var(--done-text); }
  .card-notes { font-size: 11px; color: var(--amber); font-family: 'DM Mono', monospace; margin-top: 4px; }
  .order-card.done .card-notes { color: var(--done-text); }

  .card-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .btn-icon {
    width: 34px; height: 34px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; transition: color 0.2s, border-color 0.2s;
  }
  .btn-icon:hover { color: var(--text); border-color: var(--muted); }
  .btn-done {
    background: var(--green-bg); border-color: var(--green-dim);
    color: var(--green); width: auto; padding: 0 12px; font-size: 12px;
  }
  .btn-done:hover { background: rgba(62,255,160,0.18) !important; }
  [data-theme="light"] .btn-done:hover { background: rgba(26,138,82,0.15) !important; }
  .order-card.done .btn-done { background: transparent; border-color: var(--border); color: var(--done-text); }
  .btn-remove:hover { color: var(--red) !important; border-color: var(--red) !important; }

  /* ── EMPTY STATE ── */
  .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); }
  .empty-state .empty-icon { font-size: 44px; margin-bottom: 14px; opacity: 0.3; }
  .empty-state p { font-family: 'DM Mono', monospace; font-size: 13px; line-height: 1.8; }

  /* ── FOOTER ── */
  footer {
    padding: 16px 28px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
  .btn-clear-all {
    background: none; border: 1px solid var(--border);
    color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 12px; padding: 8px 20px; border-radius: 8px;
    cursor: pointer; transition: color 0.2s, border-color 0.2s, background 0.2s;
    letter-spacing: 0.5px;
  }
  .btn-clear-all:hover { color: var(--red); border-color: var(--red); background: rgba(255,79,79,0.06); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--green); color: #061009;
    font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500;
    padding: 11px 18px; border-radius: 10px; z-index: 200;
    transform: translateY(80px); opacity: 0;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
    pointer-events: none; max-width: 340px;
  }
  [data-theme="light"] .toast { color: #fff; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.warn { background: var(--amber); color: #1a0f00; }
  .toast.err { background: var(--red); color: #fff; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <div class="logo">Zybadi's Queue</div>
    <div class="logo-sub">LIVE ORDER MANAGER</div>
  </div>
  <div class="header-right">
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="stat-pending">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-num amber" id="stat-total">0</div>
        <div class="stat-label">Groups</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-num muted" id="stat-done">0</div>
        <div class="stat-label">Done</div>
      </div>
    </div>
    <button class="btn-theme" id="btn-theme" onclick="toggleTheme()" title="Toggle light/dark">🌙</button>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-bar" id="progress-bar" style="width:0%"></div>
</div>

<!-- IMPORT -->
<div class="import-section">
  <button class="btn-import" onclick="importFromClipboard()">⬇ Import Orders</button>
</div>

<!-- MANUAL ADD -->
<div class="add-section">
  <h2>➕ Add Manually</h2>
  <div class="add-form">
    <input class="input-customer" id="inp-customer" placeholder="Customer name" />
    <input class="input-item" id="inp-item" placeholder="Item / product name" />
    <input class="input-notes" id="inp-notes" placeholder="Notes (optional)" />
    <button class="btn-add" onclick="addOrderManual()">ADD</button>
  </div>
</div>

<!-- QUEUE -->
<div class="queue-section">
  <div class="queue-header">
    <div class="queue-title">LIVE QUEUE</div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="btn-sort" id="btn-sort" onclick="toggleSort()" title="Toggle sort order">🕐 Oldest First</button>
      <button class="btn-clear-done" onclick="clearDone()">Clear Completed</button>
    </div>
  </div>
  <div class="queue-list" id="queue-list"></div>
</div>

<!-- FOOTER -->
<footer>
  <button class="btn-clear-all" onclick="clearAll()">🗑 Clear All Orders</button>
</footer>

<div class="toast" id="toast"></div>

<script>
  // ── STATE ──
  // Each queue entry is a GROUP: { id, customer, items:[{item, orderId, datetime}], notes, done, ts }
  let queue = JSON.parse(localStorage.getItem('zybadiQueue') || '[]');
  let theme = localStorage.getItem('zybadiTheme') || 'dark';
  let sortOrder = localStorage.getItem('zybadiSort') || 'asc'; // 'asc' = oldest first
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('btn-theme').textContent = theme === 'dark' ? '🌙' : '☀️';

  const uid = () => Math.random().toString(36).slice(2,9);

  // ── THEME ──
  function toggleTheme() {
    theme = theme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('btn-theme').textContent = theme === 'dark' ? '🌙' : '☀️';
    localStorage.setItem('zybadiTheme', theme);
  }

  // ── SOUND ──
  function playSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [[880,0],[1108,0.13]].forEach(([freq,delay]) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = freq; o.type = 'sine';
        const t = ctx.currentTime + delay;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(0.18, t+0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t+0.45);
        o.start(t); o.stop(t+0.5);
      });
    } catch(e) {}
  }

  // ── TOAST ──
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (type ? ' '+type : '') + ' show';
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 3200);
  }

  // ── SAVE ──
  function save() { localStorage.setItem('zybadiQueue', JSON.stringify(queue)); }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ── FORMAT DATETIME ──
  function fmtDatetime(dt) {
    if (!dt) return '';
    const m = dt.match(/(\d{2})\/(\d{2})\/(\d{4})\s*(.+)?/);
    if (!m) return dt;
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const mon = months[parseInt(m[2],10)-1] || m[2];
    const day = parseInt(m[1],10);
    const time = m[4] ? m[4].trim() : '';
    return time ? `${mon} ${day}, ${time}` : `${mon} ${day}`;
  }

  // ── SORT ──
  function parsedt(dt) {
    // Parse datetime string "DD/MM/YYYY HH:MM AM/PM" into a comparable value
    if (!dt) return 0;
    const m = dt.match(/(\d{2})\/(\d{2})\/(\d{4})\s*(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
    if (!m) return 0;
    let h = parseInt(m[4],10);
    const min = parseInt(m[5],10);
    const ampm = (m[6]||'').toUpperCase();
    if (ampm === 'PM' && h !== 12) h += 12;
    if (ampm === 'AM' && h === 12) h = 0;
    return new Date(parseInt(m[3],10), parseInt(m[2],10)-1, parseInt(m[1],10), h, min).getTime();
  }

  function getGroupTime(g) {
    // Use the earliest datetime in the group
    const times = g.items.map(it => parsedt(it.datetime)).filter(t => t > 0);
    return times.length ? Math.min(...times) : (g.ts || 0);
  }

  function toggleSort() {
    sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
    localStorage.setItem('zybadiSort', sortOrder);
    const btn = document.getElementById('btn-sort');
    btn.textContent = sortOrder === 'asc' ? '🕐 Oldest First' : '🕐 Newest First';
    render();
  // Init sort button label
  const _sb = document.getElementById('btn-sort');
  if (_sb) _sb.textContent = sortOrder === 'asc' ? '🕐 Oldest First' : '🕐 Newest First';
  }

  // ── RENDER ──
  function render() {
    const list = document.getElementById('queue-list');
    const pending = queue.filter(g => !g.done);
    const done = queue.filter(g => g.done);
    document.getElementById('stat-total').textContent = queue.length;
    document.getElementById('stat-pending').textContent = pending.length;
    document.getElementById('stat-done').textContent = done.length;
    const pct = queue.length ? Math.round(done.length / queue.length * 100) : 0;
    document.getElementById('progress-bar').style.width = pct + '%';

    if (!queue.length) {
      list.innerHTML = `<div class="empty-state">
        <div class="empty-icon">📦</div>
        <p>No orders yet.<br>Copy your Siin orders page and click Import,<br>or add orders manually above.</p>
      </div>`;
      return;
    }

    // Sort pending by datetime
    pending.sort((a, b) => {
      const ta = getGroupTime(a), tb = getGroupTime(b);
      return sortOrder === 'asc' ? ta - tb : tb - ta;
    });
    const currentId = pending.length ? pending[0].id : null;

    list.innerHTML = queue.map((g, i) => {
      const cur = g.id === currentId, dn = g.done;
      const qty = g.items.length;

      // Smart item label: group same items with count
      const itemCounts = {};
      g.items.forEach(it => { itemCounts[it.item] = (itemCounts[it.item]||0)+1; });
      const itemStr = Object.entries(itemCounts)
        .map(([name, cnt]) => cnt > 1 ? `${name} ×${cnt}` : name)
        .join(', ');

      // Order IDs
      const ids = g.items.map(it => it.orderId).filter(Boolean);

      // Datetime: show range if multiple
      const datetimes = g.items.map(it => it.datetime).filter(Boolean);
      let dtStr = '';
      if (datetimes.length === 1) {
        dtStr = fmtDatetime(datetimes[0]);
      } else if (datetimes.length > 1) {
        const first = fmtDatetime(datetimes[datetimes.length - 1]);
        const last  = fmtDatetime(datetimes[0]);
        dtStr = first === last ? first : `${first} → ${last}`;
      }

      return `<div class="order-card${cur?' current':''}${dn?' done':''}" id="card-${g.id}">
        ${cur ? '<div class="current-tag">Now Serving</div>' : ''}
        <div class="card-body">
          <div class="card-position">${i+1}</div>
          <div class="card-info">
            <div class="card-customer">${esc(g.customer)}</div>
            <div class="card-item">${esc(itemStr)}</div>
            ${qty > 1 ? `<div class="card-qty">📦 ${qty} Orders</div>` : ''}
            <div class="card-meta">
              <div class="card-ids" style="display:flex;gap:4px;flex-wrap:wrap;">
                ${ids.map(id => `<span class="card-order-id">#${esc(id)}</span>`).join('')}
              </div>
              ${dtStr ? `<div class="card-datetime">🕐 ${esc(dtStr)}</div>` : ''}
            </div>
            ${g.notes ? `<div class="card-notes">📝 ${esc(g.notes)}</div>` : ''}
          </div>
          <div class="card-actions">
            ${!dn ? `
              <button class="btn-icon" onclick="move('${g.id}',-1)" title="Move up">↑</button>
              <button class="btn-icon" onclick="move('${g.id}',1)" title="Move down">↓</button>
            ` : ''}
            <button class="btn-icon btn-done" onclick="toggleDone('${g.id}')">${dn ? '↩ Undo' : '✓ Done'}</button>
            <button class="btn-icon btn-remove" onclick="removeGroup('${g.id}')" title="Remove">✕</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // ── IMPORT FROM CLIPBOARD ──
  async function importFromClipboard() {
    let text = '';
    try { text = await navigator.clipboard.readText(); }
    catch(e) {
      showToast('⚠ Clipboard access denied. Allow it when prompted.', 'warn');
      return;
    }
    if (!text || text.length < 50) {
      showToast('⚠ Clipboard is empty. Copy the orders page first.', 'warn');
      return;
    }

    const parsed = parseOrders(text);
    if (!parsed.length) {
      showToast('⚠ No orders found. Make sure you copied the full orders page.', 'warn');
      return;
    }

    // Collect all existing order IDs for duplicate check
    const existingIds = new Set();
    queue.forEach(g => g.items.forEach(it => { if (it.orderId) existingIds.add(it.orderId); }));

    let skipped = 0;
    const newOrders = parsed.filter(o => {
      if (o.orderId && existingIds.has(o.orderId)) { skipped++; return false; }
      return true;
    });

    if (!newOrders.length) {
      showToast(`ℹ All orders already in queue${skipped ? ` (${skipped} skipped)` : ''}.`, 'warn');
      return;
    }

    // ── GROUP: consecutive same customer = one card ──
    const groups = [];
    newOrders.forEach(o => {
      const last = groups[groups.length - 1];
      if (last && last.customer === o.customer) {
        last.items.push({ item: o.item, orderId: o.orderId, datetime: o.datetime });
      } else {
        groups.push({
          id: uid(),
          customer: o.customer,
          items: [{ item: o.item, orderId: o.orderId, datetime: o.datetime }],
          notes: '',
          done: false,
          ts: Date.now()
        });
      }
    });

    // Add new groups after existing pending, before done
    const pending = queue.filter(g => !g.done);
    const done = queue.filter(g => g.done);
    queue = [...pending, ...groups, ...done];

    save(); render(); playSound();

    const totalOrders = newOrders.length;
    showToast(
      `✓ ${groups.length} group${groups.length>1?'s':''} · ${totalOrders} order${totalOrders>1?'s':''}` +
      (skipped ? ` · ${skipped} duplicate${skipped>1?'s':''} skipped` : '')
    );
  }

  // ── PARSE ORDERS FROM COPIED PAGE TEXT ──
  function parseOrders(text) {
    const orders = [];
    const seen = {};
    const idMatches = [...text.matchAll(/#(\d{5,})/g)];

    idMatches.forEach(idMatch => {
      const oid = idMatch[1];
      if (seen[oid]) return;

      const pos = idMatch.index;
      const chunk = text.substring(Math.max(0, pos - 300), pos + 100);
      const afterChunk = text.substring(pos, pos + 400);

      const lines = chunk.split('\n').map(l => l.trim()).filter(l => l && l.length > 1 && l.length < 120);
      const afterLines = afterChunk.split('\n').map(l => l.trim()).filter(l => l && l.length > 1 && l.length < 80);

      let item = '', customer = '';

      // Item name: last valid line before the order ID
      for (let i = lines.length - 1; i >= 0; i--) {
        const l = lines[i];
        if (/#\d+/.test(l)) continue;
        if (/^\d{2}\/\d{2}\/\d{4}/.test(l)) continue;
        if (/^(SAR|Item Name|Customer|Date|Type|Price|Payout|Payment|Ship|Earn|All|Pending|Completed|Filter|Orders|ITEM|CUSTOMER)/i.test(l)) continue;
        if (l.length > 3) { item = l; break; }
      }

      // Customer: first valid line after the order ID
      for (let i = 1; i < afterLines.length; i++) {
        const l = afterLines[i];
        if (/#\d+/.test(l)) break;
        if (/^\d{2}\/\d{2}\/\d{4}/.test(l)) continue;
        if (/^(SAR|Buy|Live|Chat|Paid|Delivered|Added|Pending|In Progress|Chatting|Ripping)/i.test(l)) continue;
        if (l.length > 2) { customer = l; break; }
      }

      // Date + time
      let datetime = '';
      const dateM = afterChunk.match(/(\d{2}\/\d{2}\/\d{4})/);
      const timeM = afterChunk.match(/(\d{1,2}:\d{2}\s*(?:AM|PM))/i);
      if (dateM && timeM) datetime = dateM[1] + ' ' + timeM[1].trim();
      else if (dateM) datetime = dateM[1];

      if (item) {
        seen[oid] = true;
        orders.push({ item, customer: customer || '?', orderId: oid, datetime });
      }
    });

    return orders;
  }

  // ── MANUAL ADD ──
  function addOrderManual() {
    const c = document.getElementById('inp-customer').value.trim();
    const it = document.getElementById('inp-item').value.trim();
    const n = document.getElementById('inp-notes').value.trim();
    if (!c || !it) { showToast('⚠ Fill in customer + item', 'warn'); return; }
    const pending = queue.filter(g => !g.done);
    const done = queue.filter(g => g.done);
    const newGroup = { id: uid(), customer: c, items: [{item: it, orderId: '', datetime: ''}], notes: n, done: false, ts: Date.now() };
    queue = [...pending, newGroup, ...done];
    save(); render(); playSound();
    ['inp-customer','inp-item','inp-notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('inp-customer').focus();
    showToast(`✓ Added: ${c}`);
  }

  // ── QUEUE ACTIONS ──
  function toggleDone(id) {
    const g = queue.find(x => x.id === id); if (!g) return;
    g.done = !g.done;
    if (g.done) queue = [...queue.filter(x => x.id!==id && !x.done), ...queue.filter(x => x.id!==id && x.done), g];
    save(); render();
  }

  function removeGroup(id) { queue = queue.filter(x => x.id !== id); save(); render(); }

  function move(id, dir) {
    const p = queue.filter(g => !g.done), dn = queue.filter(g => g.done);
    const i = p.findIndex(g => g.id === id), j = i + dir;
    if (j < 0 || j >= p.length) return;
    [p[i], p[j]] = [p[j], p[i]];
    queue = [...p, ...dn]; save(); render();
  }

  function clearDone() {
    if (!queue.some(g => g.done)) { showToast('ℹ No completed orders to clear', 'warn'); return; }
    queue = queue.filter(g => !g.done); save(); render();
    showToast('Cleared completed orders');
  }

  function clearAll() {
    if (!queue.length) return;
    if (!confirm('Clear ALL orders? This cannot be undone.')) return;
    queue = []; save(); render();
    showToast('Queue cleared');
  }

  // ── KEYBOARD SHORTCUT: ⌘V anywhere (not in input) triggers import ──
  document.addEventListener('keydown', e => {
    const tag = document.activeElement.tagName;
    const inInput = tag === 'INPUT' || tag === 'TEXTAREA';

    if (e.key === 'Enter' && inInput && ['inp-customer','inp-item','inp-notes'].includes(document.activeElement.id)) {
      addOrderManual();
      return;
    }

    // ⌘V or Ctrl+V outside inputs → import
    if ((e.metaKey || e.ctrlKey) && e.key === 'v' && !inInput) {
      e.preventDefault();
      importFromClipboard();
    }
  });

  render();
</script>
</body>
